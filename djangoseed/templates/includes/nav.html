    </a>
  </div>

  <div class="navbar-center">
    <ul class="menu menu-horizontal px-1 gap-2 font-medium text-white text-base hidden lg:flex">
      <li>

      </li>
      <li>

        </a>
      </li>
      <li>
        <a class="relative inline-block group" href="{% url 'home' %}#servicos">

          <span class="absolute left-0 -bottom-0.5 h-0.5 w-full origin-left scale-x-0 bg-[#171717] transition-transform duration-300 group-hover:scale-x-100"></span>
        </a>
      </li>
      <li>

        </a>
      </li>
      <li>

      </ul>
    </div>
  </div>
</div>

<script>
  // Esconde navbar no mobile ao descer e mostra ao subir
  let lastScrollY = window.scrollY;
  function updateNavbarState() {
    const navbar = document.getElementById('main-navbar');
    const currentScroll = window.scrollY;

    if (currentScroll > 50) {
      navbar.classList.add('navbar-scrolled');
    } else {
      navbar.classList.remove('navbar-scrolled');
    }

    const isMobile = window.innerWidth < 1024;
    if (!isMobile) {
      navbar.classList.remove('translate-y-[-100%]','nav-hidden');
      navbar.classList.add('translate-y-0');
      lastScrollY = currentScroll;
      return;
    }
    if (currentScroll > lastScrollY && currentScroll > 40) {
      // descendo
      navbar.classList.add('translate-y-[-100%]');
      navbar.classList.add('nav-hidden');
      navbar.classList.remove('translate-y-0');
    } else {
      // subindo
      navbar.classList.remove('translate-y-[-100%]');
      navbar.classList.remove('nav-hidden');
      navbar.classList.add('translate-y-0');
    }
    lastScrollY = currentScroll;
  }

  window.addEventListener('scroll', updateNavbarState);
  window.addEventListener('resize', updateNavbarState);
  updateNavbarState();
</script>

<style>
  .navbar-scrolled {
    background-color: #171717 !important;
    border-color: rgba(255, 255, 255, 0.1) !important;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1) !important;
  }

  /* Smoothly fade/move logo when navbar is hidden on mobile */
  .logo-img{
    transition: opacity .24s ease, transform .24s ease;
  }
  /* when navbar has nav-hidden, hide logo smoothly (no clipping) */
  .nav-hidden .logo-img{
    opacity: 0;
    transform: translateY(-8px);
  }
</style>
